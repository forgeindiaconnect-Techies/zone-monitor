<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(0, -20)">
    <!-- Blue shape: Top bar and left bar -->
    <polygon points="180,120 280,120 240,145 205,145 205,235 180,260" fill="#005BAA" />
    
    <!-- Yellow Rectangle -->
    <rect x="225" y="170" width="40" height="20" fill="#E6B800" />
    <!-- Blue Elephant (small icon) -->
    <path d="M239,183 c0,0,1-3,4-3 c2,0,3,1,3,1 v4 h-2 v3 h-2 v-3 c0,0-1,0-2,1 v2 h-2 v-5 C238,183,239,183,239,183 z" fill="#005BAA"/>

    <!-- Yellow Triangle -->
    <polygon points="245,200 300,250 190,250" fill="#E6B800" />
    
    <!-- Text: FORGE INDIA -->
    <text x="250" y="310" font-family="Arial, sans-serif" font-size="52" text-anchor="middle" font-weight="900">
      <tspan fill="#005BAA">FORGE </tspan>
      <tspan fill="#E6B800">INDIA</tspan>
    </text>
    
    <!-- Text: CONNECT PVT.LTD -->
    <text x="250" y="365" font-family="Georgia, serif" font-size="34" fill="#005BAA" text-anchor="middle" font-weight="bold" letter-spacing="1">CONNECT PVT.LTD</text>

    <!-- Text: SHAPING FUTURE -->
    <text x="250" y="415" font-family="Arial, sans-serif" font-size="28" fill="#111111" text-anchor="middle" font-weight="bold" letter-spacing="2">SHAPING FUTURE</text>
  </g>
</svg>
